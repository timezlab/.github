<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-label="TimezLab">
  <title>TimezLab — Data Rings</title>
  <g fill="none" stroke-linecap="round">
    <!-- Outer ring -->
    <path d="M24,5 A19,19 0 1,1 5,24"
          stroke="#22D3EE" stroke-width="2.5"/>
    <!-- Middle ring, rotated 120° -->
    <path d="M24,11 A13,13 0 1,1 11,24"
          stroke="#D4D4D8" stroke-width="2.5"
          transform="rotate(120 24 24)"/>
    <!-- Inner ring, rotated 240° -->
    <path d="M24,16 A8,8 0 1,1 16,24"
          stroke="#8B5CF6" stroke-width="2.5"
          transform="rotate(240 24 24)"/>
  </g>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="3" fill="#8B5CF6"/>
</svg>
